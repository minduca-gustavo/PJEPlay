<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Rota PJE</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>
<div class="shell">

  <!-- CABEÇALHO -->
  <header>
    <span class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="36" height="36">
        <defs>
          <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   style="stop-color:#1565C0;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
          </linearGradient>
        </defs>
        <path d="M 64 6 L 108 18 L 114 60 Q 114 95 64 122 Q 14 95 14 60 L 20 18 Z"
              fill="url(#shieldGrad)" />
        <path d="M 64 14 L 103 24 L 108 62 Q 108 91 64 114 Q 20 91 20 62 L 25 24 Z"
              fill="none" stroke="white" stroke-width="2.5" />
        <path d="M 64 14 L 103 24 L 101 42 L 27 42 L 25 24 Z" fill="#F57C00" />
        <line x1="24" y1="42" x2="104" y2="42" stroke="white" stroke-width="2"/>
        <text x="64" y="37" text-anchor="middle"
              font-family="'Arial Black','Impact',sans-serif"
              font-size="15" font-weight="900" fill="white" letter-spacing="2">ROTA</text>
        <text x="64" y="88" text-anchor="middle"
              font-family="'Arial Black','Impact',sans-serif"
              font-size="36" font-weight="900" fill="white" letter-spacing="1">PJE</text>
        <line x1="48" y1="97" x2="80" y2="97" stroke="white" stroke-width="1.5"
              stroke-dasharray="5,4" opacity="0.6"/>
      </svg>
    </span>

    <div class="header-text">
      <h1>ROTA PJE</h1>
      <p id="subtitulo">Evita Queda + Editor de Tarefa do Usuário</p>
    </div>

    <button id="btn-toggle" class="btn-toggle ativo" title="Ligar/Desligar extensão">
      <span id="toggle-icone">ON</span>
    </button>

    <div class="nav-setas">
      <button class="seta" id="seta-esq" disabled>&#8592;</button>
      <span class="nav-ind" id="nav-ind">1 / 4</span>
      <button class="seta" id="seta-dir">&#8594;</button>
    </div>
  </header>

  
  <!-- CORPO -->
  <div class="corpo">

    <!-- PÁGINA 1 — Editor de Tarefa -->
    <div class="pagina ativa" id="pagina-1">

      <div class="bloco bloco-destaque" id="bloco-evita-queda">
        <div class="bloco-row">
          <label class="bloco-label" style="flex:1">
            Evita Queda de OJ
            <span class="bloco-hint">Mantém o usuário conectado e cria botão para troca de OJ quando necessário</span>
          </label>
          <button class="btn-filtro-liga" id="btn-evita-queda" title="Ativar/Desativar Evita Queda">🛡️</button>
        </div>
        <div style="margin-top:5px;">
          <span id="status-evita-queda" class="status-filtros-inline"></span>
        </div>
      </div>

      <div class="bloco">
        <div class="bloco-row">
          <label class="bloco-label" style="flex:1">Editar tarefas do usuário (a tarefa ativa agora é escolhida no botão rota no painel).</label>
          <button class="btn-ico" id="btn-nova-tarefa" title="Nova tarefa">＋</button>
          <button class="btn-ico btn-perigo" id="btn-excluir-tarefa" title="Excluir tarefa">🗑</button>
        </div>
        <div class="bloco-row" style="margin-top:6px;gap:6px;">
          <select id="sel-tarefa" class="select-full"></select>
          <input  id="input-nome-tarefa" class="input-texto" placeholder="Nome da nova tarefa…" style="display:none;flex:1">
          <button id="btn-salvar-nome" class="btn-salvar" style="display:none">OK</button>
        </div>
      </div>

      <div class="bloco">
        <label class="bloco-label">
          Anotação padrão
          <span class="bloco-hint">(pré-preenche o campo de nota em cada processo)</span>
        </label>
        <input id="input-tarefa-unica" class="input-texto" placeholder="Ex: Acordo — verificar cálculo">
      </div>

      <div class="bloco">
        <div class="bloco-row">
          <label class="bloco-label" style="flex:1">Janelas <span class="bloco-hint">(máx. 5)</span></label>
          <button class="btn-ico" id="btn-add-slot" title="Adicionar janela">＋</button>
        </div>
        <div id="slots-container"></div>
      </div>

      <div class="bloco" id="bloco-temporizador">
        <div class="bloco-row">
          <label class="bloco-label" style="flex:1;display:flex;align-items:center;gap:6px;">
            <input type="checkbox" id="chk-temporizador"
                   style="accent-color:var(--pje-laranja);width:14px;height:14px;cursor:pointer;">
            Modo Temporizador
          </label>
        </div>
        <div id="temporizador-config" style="display:none">
          <div style="display:flex;align-items:center;gap:6px;">
            <label class="bloco-hint" style="white-space:nowrap;">Segundos:</label>
            <input id="input-timer-segundos" class="input-texto" type="number"
                   min="1" max="3600" placeholder="Ex: 30" style="width:70px;">
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            <label class="bloco-hint" style="white-space:nowrap;">Opções:</label>
            <input id="input-timer-opcoes" class="input-texto" type="text"
                   placeholder="Ex: Despacho, Arquivar, Verificar" style="flex:1;">
          </div>
          <p class="bloco-hint" style="margin:0;line-height:1.4;">
            Termos separados por vírgula viram botões no widget.
            O temporizador avança ao zero; clique nele para pausar/retomar.
          </p>
        </div>
      </div>

      <div class="footer-actions">
        <span id="status-tarefa" class="status-msg"></span>
        <button id="btn-salvar-tarefa" class="btn-salvar">Salvar Tarefa</button>
      </div>

    </div><!-- /pagina-1 -->


    <!-- PÁGINA 2 — Configurações de Pintura -->
    <div class="pagina" id="pagina-2">

      <div id="regras-container" class="drag-list"></div>

      <div class="footer-actions">
        <span id="status-pintura" class="status-msg"></span>
        <button id="btn-salvar-pintura" class="btn-salvar">Salvar Pintura</button>
      </div>

    </div><!-- /pagina-2 -->

    <!-- PÁGINA 3 — Melhor Leitura -->
    <div class="pagina" id="pagina-3">

      <div class="bloco">
        <div class="bloco-row">
          <label class="bloco-label" style="flex:1">
            Melhor Leitura
            <span class="bloco-hint">Alt+Clique em qualquer elemento para ler seu texto ampliado</span>
          </label>
          <button class="btn-filtro-liga" id="btn-ativar-melhor-leitura" title="Ativar/Desativar Melhor Leitura">👓</button>  
        </div>
      </div>

      <div class="bloco">
        <label class="bloco-label">Cor do fundo</label>
        <div class="bloco-row">
          <span class="ml-swatch" id="ml-bgSwatch"></span>
          <input type="text" class="input-texto ml-hex" id="ml-bgColor" value="#000000" maxlength="7" spellcheck="false" style="font-family:monospace;">
        </div>
        <div class="ml-paleta" id="ml-paletaFundo"></div>
      </div>

      <div class="bloco">
        <label class="bloco-label">Cor do texto</label>
        <div class="bloco-row">
          <span class="ml-swatch" id="ml-textSwatch"></span>
          <input type="text" class="input-texto ml-hex" id="ml-textColor" value="#ffdd00" maxlength="7" spellcheck="false" style="font-family:monospace;">
        </div>
        <div class="ml-paleta" id="ml-paletaTexto"></div>
      </div>

      <div class="bloco">
        <label class="bloco-label">Tamanho da letra</label>
        <div class="velocidade-ctrl">
          <input type="range" id="ml-fontSize" min="14" max="48" value="22" style="flex:1;accent-color:#F9B73F;">
          <span class="vel-val" id="ml-fontSizeLabel">22px</span>
        </div>
      </div>

      <div class="bloco">
        <label class="bloco-label">Largura do box</label>
        <div class="velocidade-ctrl">
          <input type="range" id="ml-boxWidth" min="240" max="800" step="20" value="480" style="flex:1;accent-color:#F9B73F;">
          <span class="vel-val" id="ml-boxWidthLabel">480px</span>
        </div>
      </div>

      <div class="bloco">
        <label class="bloco-label">Pré-visualização</label>
        <div id="ml-preview" style="border-radius:8px;padding:14px 18px;text-align:center;font-weight:600;line-height:1.5;transition:background 0.2s,color 0.2s,font-size 0.2s;word-break:break-word;min-height:50px;display:flex;align-items:center;justify-content:center;">
          Texto de exemplo para leitura
        </div>
      </div>

      <div class="footer-actions">
        <span id="ml-status" class="status-msg"></span>
        <button id="ml-btnSalvar" class="btn-salvar">Salvar</button>
      </div>

    </div><!-- /pagina-3 Melhor Leitura -->

    <!-- PÁGINA 4 — Para desenvolvedores (protegida por senha) -->
    <div class="pagina" id="pagina-4">

      <!-- Tela de senha (visível quando não autenticado) -->
      <div id="superfiltro-senha" class="bloco" style="display:none">
        <label class="bloco-label">
          Reservado para desenvolvedores
          <span class="bloco-hint">digite a senha para continuar</span>
        </label>
        <div style="display:flex;gap:6px;margin-top:6px;">
          <input id="input-senha-sf" class="input-texto" type="password"
                 placeholder="Senha…" style="flex:1">
          <button id="btn-senha-sf" class="btn-salvar">OK</button>
        </div>
        <span id="status-senha-sf" class="status-msg"
              style="display:block;margin-top:6px;min-height:16px;opacity:1;color:var(--pje-erro-texto);"></span>
      </div>

      <!-- Conteúdo real (visível quando autenticado) -->
      <div id="superfiltro-conteudo" style="display:none">

        <div class="bloco">
          <div class="bloco-row">
            <label class="bloco-label" style="flex:1">
              Modo Desenvolvedor
              <span class="bloco-hint">ativa logs no console (relatar)</span>
            </label>
            <button class="btn-filtro-liga" id="btn-modo-dev" title="Ativar/Desativar modo desenvolvedor">🛠️</button>
          </div>
          <div style="margin-top:5px;">
            <span id="status-modo-dev" class="status-filtros-inline"></span>
          </div>
        </div>

        <div class="bloco">
          <div class="bloco-row">
            <label class="bloco-label" style="flex:1">
              Super Filtros
              <span class="bloco-hint">widget no painel do PJE</span>
            </label>
            <button class="btn-filtro-liga" id="btn-ativar-filtros" title="Ativar/Desativar widget">🔍</button>
          </div>
          <div style="margin-top:5px;">
            <span id="status-filtros" class="status-filtros-inline"></span>
          </div>
        </div>

        <div class="bloco" style="background:var(--pje-info-bg);border-color:var(--pje-info-borda);">
          <p style="font-size:11px;color:var(--pje-info-texto);line-height:1.5;">
            Os botões e configurações do Super Filtros 
            <strong>flutuam</strong>, na janela do PJE.
          </p>
        </div>

      </div><!-- /superfiltro-conteudo -->

    </div><!-- /pagina-4 -->

  </div><!-- /corpo -->

</div><!-- /shell -->
<script src="../../../modulos/definicoes.js"></script>
<script src="../../../rota/configuracao.js"></script>
<script src="../../../rota/tarefas/index.js"></script>
<script src="programa.js"></script>
</body>
</html>
